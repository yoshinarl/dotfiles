# tmux configuration generated by tmux.info
# https://tmux.info/tools/config-generator

# Enable Mouse Support
set -g mouse on

# Increase History Limit
set -g history-limit 100000

# Start Index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True Color Support
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"

# Panel Navigation
bind -n S-Left select-pane -L
bind -n S-Down select-pane -D
bind -n S-Up select-pane -U
bind -n S-Right select-pane -R

bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

# Terminal
set -g focus-events on
set -g set-clipboard on
set -g extended-keys on

# Split in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Pane style
set -g pane-border-lines double
set -g pane-border-indicators both

# scroll row count
bind -T root WheelUpPane if-shell -F "#{mouse_any_flag}" \
  "send-keys -M" \
  "copy-mode -e; send-keys -X -N 1 scroll-up"

bind -T root WheelDownPane send-keys -X -N 1 scroll-down
